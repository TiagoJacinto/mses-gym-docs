    - separator [ref=e60]
    - heading "1. Introdução" [level=2] [ref=e61]
    - paragraph [ref=e62]: "Muitos ginásios, especialmente os mais pequenos, ainda funcionam com registos em papel: folhas de presença, envelopes com pagamentos, cadernos de avaliação. Isto dificulta o acompanhamento de cada membro e a gestão do dia-a-dia."
    - paragraph [ref=e63]: Este trabalho propõe um sistema digital para ginásios de pequena e média dimensão. A ideia é centralizar a gestão de membros, inscrições, horários de aulas, presenças e pagamentos, substituindo o papel por um sistema integrado.
    - separator [ref=e64]
    - 'heading "2. Etapa 1 — Análise de Requisitos {#2-etapa-1—análise-de-requisitos}" [level=2] [ref=e65]'
    - 'heading "2.1. Descrição do Problema {#21-descrição-do-problema}" [level=3] [ref=e66]'
    - paragraph [ref=e67]: "Ginásios de pequena e média dimensão ainda dependem de processos manuais em papel: folhas de inscrição, envelopes com pagamentos, registos de presença em caderno. O resultado é um acompanhamento irregular dos membros, horários imprevisíveis e faturas que só aparecem quando alguém se lembra de as emitir."
    - 'heading "2.1.1. Descrição do Sistema {#211-descrição-do-sistema}" [level=3] [ref=e68]'
    - paragraph [ref=e69]: "Plataforma digital centralizada que cobre todas as operações de um ginásio: registo de membros, planos de treino, gestão de horários, inscrições e faturação."
    - 'heading "2.1.2. Objetivo do Software {#212-objetivo-do-software}" [level=3] [ref=e70]'
    - paragraph [ref=e71]: Tornar a gestão do ginásio mais eficiente e centralizada. Na prática, significa processos mais ágeis para a equipa, documentação de membros em conformidade, e uma experiência melhor para quem treina.
    - 'heading "2.1.3. Contexto de Utilização {#213-contexto-de-utilização}" [level=3] [ref=e72]'
    - paragraph [ref=e73]: O sistema funciona no dia-a-dia do ginásio com diferentes perfis a trabalhar em paralelo. A receção gere acessos, atendimento e pagamentos presenciais. Treinadores preenchem planos de treino. Administradores tratam de inscrições e gestão de membros. Pagamentos são processados pelo membro via app ou presencialmente no balcão com ajuda do(a) rececionista. O trabalho decorre sobretudo em tablets e computadores de balcão.
    - 'heading "2.1.4. Principais Funcionalidades Esperadas {#214-principais-funcionalidades-esperadas}" [level=3] [ref=e74]'
    - list [ref=e75]:
      - listitem [ref=e76]:
        - strong [ref=e77]: "Membros:"
        - text: criar, procurar por nome ou número, atualizar e desativar registos.
      - listitem [ref=e78]:
        - strong [ref=e79]: "Planos de treino:"
        - text: exercícios personalizados com séries, repetições, carga e descanso.
      - listitem [ref=e80]:
        - strong [ref=e81]: "Inscrições:"
        - text: criar, renovar e cancelar inscrições.
      - listitem [ref=e82]:
        - strong [ref=e83]: "Assiduidade:"
        - text: check-in e check-out por cartão ou código.
      - listitem [ref=e84]:
        - strong [ref=e85]: "Financeiro:"
        - text: mensalidades geradas automaticamente, pagamentos totais ou parciais, faturas.
      - listitem [ref=e86]:
        - strong [ref=e87]: "Aulas de grupo:"
        - text: horários, reservas, cancelamentos e controlo de lotação.
      - listitem [ref=e88]:
        - strong [ref=e89]: "Validação automática:"
        - text: a inscrição é verificada no check-in.
      - listitem [ref=e90]:
        - strong [ref=e91]: "App para membros:"
        - text: consulta de planos, reserva de aulas e check-in pelo telemóvel.
      - listitem [ref=e92]:
        - strong [ref=e93]: "Relatórios de faturação:"
        - text: receitas e valores em dívida por período.
      - listitem [ref=e94]:
        - strong [ref=e95]: "Segurança:"
        - text: login com sessão que expira apõs 30 min sem atividade, passwords com hash bcrypt, e acesso por tipo de Utilizador (Membro, Treinador, Rececionista, Gestor, Admin).
