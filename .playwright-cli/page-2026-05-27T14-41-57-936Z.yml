    - heading "1. Introdução" [level=1] [ref=e63]
    - paragraph [ref=e64]: "Muitos ginásios pequenos ainda funcionam com papel: folhas de presença em caderno, envelopes com dinheiro de pagamentos, notas manuscritas sobre o estado de cada membro. Isto complica o acompanhamento de cada pessoa e torna a gestão do dia-a-dia mais difícil do que precisa de ser."
    - paragraph [ref=e65]: Este trabalho descreve um sistema digital para ginásios de pequena e média dimensão. A ideia é ter num só sítio a gestão de membros, inscrições, horários de aulas, presenças e pagamentos — em vez de depender de papel.
    - separator [ref=e66]
    - heading "2. Etapa 1 — Análise de Requisitos" [level=1] [ref=e67]
    - heading "2.1. Descrição do Problema" [level=2] [ref=e68]
    - paragraph [ref=e69]: "Ginásios de pequena e média dimensão ainda usam processos manuais em papel: folhas de inscrição, envelopes com pagamentos, registos de presença em caderno. O resultado é um acompanhamento irregular dos membros, horários imprevisíveis e faturas que só aparecem quando alguém se lembra de as emitir."
    - heading "2.1.1. Descrição do Sistema" [level=3] [ref=e70]
    - paragraph [ref=e71]: "Plataforma digital que cobre todas as operações de um ginásio: registo de membros, planos de treino, gestão de horários, inscrições e faturação."
    - heading "2.1.2. Objetivo do Software" [level=3] [ref=e72]
    - paragraph [ref=e73]: "Tornar a gestão do ginásio mais eficiente e centralizada. Na prática: processos mais rápidos para a equipa, documentação de membros em conformidade, e uma experiência melhor para quem treina."
    - heading "2.1.3. Contexto de Utilização" [level=3] [ref=e74]
    - paragraph [ref=e75]: O sistema é usado no dia-a-dia do ginásio por diferentes perfis em paralelo. A receção trata de acessos, atendimento e pagamentos presenciais. Treinadores preenchem planos de treino. Administradores tratam de inscrições e gestão de membros. Pagamentos são feitos pelo membro via app ou presencialmente no balcão com ajuda do(a) rececionista. O trabalho decorre sobretudo em tablets e computadores de balcão.
    - heading "2.1.4. Principais Funcionalidades Esperadas" [level=3] [ref=e76]
    - list [ref=e77]:
      - listitem [ref=e78]:
        - strong [ref=e79]: "Membros:"
        - text: criar, procurar por nome ou número, atualizar e desativar registos.
      - listitem [ref=e80]:
        - strong [ref=e81]: "Planos de treino:"
        - text: exercícios personalizados com séries, repetições, carga e descanso.
      - listitem [ref=e82]:
        - strong [ref=e83]: "Inscrições:"
        - text: criar, renovar e cancelar inscrições.
      - listitem [ref=e84]:
        - strong [ref=e85]: "Assiduidade:"
        - text: check-in e check-out por cartão ou código.
      - listitem [ref=e86]:
        - strong [ref=e87]: "Financeiro:"
        - text: mensalidades geradas automaticamente, pagamentos totais ou parciais, faturas.
      - listitem [ref=e88]:
        - strong [ref=e89]: "Aulas de grupo:"
        - text: horários, reservas, cancelamentos e controlo de lotação.
      - listitem [ref=e90]:
        - strong [ref=e91]: "Validação automática:"
        - text: a inscrição é verificada no check-in.
      - listitem [ref=e92]:
        - strong [ref=e93]: "App para membros:"
        - text: consulta de planos, reserva de aulas e check-in pelo telemóvel.
      - listitem [ref=e94]:
        - strong [ref=e95]: "Relatórios de faturação:"
        - text: receitas e valores em dívida por período.
      - listitem [ref=e96]:
        - strong [ref=e97]: "Segurança:"
        - text: login com aula que expira após 30 min sem atividade, passwords com hash bcrypt, e acesso por tipo de utilizador (Membro, Treinador, Rececionista, Gestor, Admin).
