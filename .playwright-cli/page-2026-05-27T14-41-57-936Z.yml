 MetodoPagamento +getTipo() String +getUltimo4Digitos() String +getDataExpiracao() DateTime or Date } class Reserva { -DateTime dataReserva -String estadoReserva -- valores: confirmada, cancelada, no_show +criar(dataReserva) Reserva +getDataReserva() DateTime or Date +getEstadoReserva() String } class CheckIn { -DateTime dataHoraEntrada -DateTime dataHoraSaida +criar(dataHoraEntrada) CheckIn +registarSaida(dataHoraSaida) void +getDataHoraEntrada() DateTime +getDataHoraSaida() DateTime or Date } class SistemaControloAcesso { -String id +validarAcesso(membroId String) Boolean +abrirPorta() void +getMembroById(membroId String) Membro } class Exercicio { -String nome -Int series -Int repeticoes -Float carga -Int descansoSegundos +criar(nome, series, repeticoes, carga, descansoSegundos) Exercicio +getNome() String +getSeries() Int +getRepeticoes() Int +getCarga() Float +getDescansoSegundos() Int } class Mensalidade { -Float valor -DateTime dataVencimento -String estado -- valores: pendente, liquidado +criar(valor, dataVencimento) Mensalidade +getValor() Float +getDataVencimento() DateTime or Date +getEstado() String } class Fatura { -String numero -Float valorTotal -DateTime dataEmissao +criar(numero, valorTotal) Fatura +getNumero() String +getValorTotal() Float +getDataEmissao() DateTime or Date } class Pagamento { -Float valor -DateTime dataPagamento -String metodo +criar(valor, metodo) Pagamento +getValor() Float +getDataPagamento() DateTime or Date +getMetodo() String } class Relatorio { -String tipo -String periodo -DateTime dataGeracao +criar(tipo, periodo) Relatorio +getTipo() String +getPeriodo() String +getDataGeracao() DateTime or Date +gerar() String } Inscricao --|> Entidade PlanoTreino --|> Entidade Sala --|> Entidade AulaGrupo --|> Entidade AulaSessao --|> Entidade MetodoPagamento --|> Entidade Reserva --|> Entidade CheckIn --|> Entidade SistemaControloAcesso --|> Entidade Exercicio --|> Entidade Mensalidade --|> Entidade Fatura --|> Entidade Pagamento --|>