@startuml
title UC-04b — Controlar Assiduidade (Check-in Assistido)

|#AntiqueWhite| **Membro** |

: Membro chega à receção;
: Apresenta identificador de acesso;

|#LightCoral| **Rececionista** |

:Consulta sistema com identificador;
partition "**Verificações**" {
    :Validar inscrição ativa;
    if (Inscrição ativa?) then (não)
        #pink:Encaminhar para regularizar;
        stop
    endif

    :Verificar mensalidades;
    if (Mensalidades em dia?) then (não)
        #pink:Informar membro;
        #pink:Encaminhar para pagamento;
        stop
    endif

    :Verificar seguro desportivo;
    if (Seguro válido?) then (não)
        #pink:Alertar para renovar;
        stop
    endif
}

:Registar check-in no sistema;
:Confirmar acesso ao membro;

|#AliceBlue| **Sistema** |

:Guardar hora de entrada;
:Gerar registo CheckIn;

|#AntiqueWhite| **Membro** |

:Acede às instalações;
stop

@enduml

